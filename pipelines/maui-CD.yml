trigger:
  branches:
    include:
    - main
  paths:
    include:
    - src/ProductJudge.Mobile
    - src/ProductJudge.Models
    - pipelines/maui-CD.yml

parameters:
- name: AppVersionMayor
  displayName: App Version (ej. 1)
  default: 1
  type: string
- name: AppVersionMinor
  displayName: Build App Version (ej. 0)
  default: 0
  type: string

pool:
  vmImage: 'windows-2022'

variables:
  - group: androidsecrets
  - group: dotnet-versions
  - name: buildConfiguration 
    value: Release
  - name: csproj
    value: 'src/ProductJudge.Mobile/ProductJudge.Mobile/ProductJudge.Mobile.csproj'    
  - name: AppVersionMinorPrepared
    ${{ if ge(parameters.AppVersionMinor, 10) }}:
      value: ${{ format('{0}',parameters.AppVersionMinor) }}
    ${{ else }}:
      value: ${{ format('0{0}',parameters.AppVersionMinor) }}
  - name: MayorAndMinorPrepared
    value: ${{ format('{0}{1}',parameters.AppVersionMayor, variables.AppVersionMinorPrepared) }}
  - name: AppVersionBuild
    value: $[counter(variables.MayorAndMinorPrepared, 1)]  
  - name: ApplicationDisplayVersion
    value: ${{ format('{0}.{1}', parameters.AppVersionMayor, parameters.AppVersionMinor ) }}
  - name: ApplicationVersion
    value: ${{ format('{0}{1}', parameters.AppVersionMayor, variables.AppVersionMinorPrepared ) }}
jobs:
- job: 'Android_Bundle'
  steps:
  - pwsh: |
       Write-Host "##vso[build.updatebuildnumber]$(ApplicationDisplayVersion).$(AppVersionBuild)"
    name: SetBuildName
    displayName: 'set BuildName'
  - task: UseDotNet@2
    inputs:
      packageType: 'sdk'
      version: '$(net-7-maui)'
      includePreviewVersions: false  
  - task: CmdLine@2
    displayName: "Install maui workloads"
    inputs:
      script: 'dotnet workload install maui-android maui-ios'

  - task: DownloadSecureFile@1
    displayName: 'Download keystore'
    name: keystore
    inputs:
      secureFile: '$(keystore-file-name)'

  - task: DotNetCoreCLI@2
    displayName: "Build android"
    inputs:
      command: 'publish'
      publishWebProjects: false
      projects: '$(csproj)'
      arguments: '-c $(buildConfiguration) -f net7.0-android /p:AndroidKeyStore=true /p:ApplicationDisplayVersion=$(ApplicationDisplayVersion).$(AppVersionBuild) /p:ApplicationVersion=$(ApplicationVersion)$(AppVersionBuild) /p:AndroidSigningKeyStore=$(keystore.secureFilePath) /p:AndroidSigningStorePass=$(androidKeyStorePass) /p:AndroidSigningKeyAlias=$(androidKeyStoreAlias) /p:AndroidSigningKeyPass=$(androidKeyStoreAliasPass)'

  - task: CopyFiles@2
    inputs:
      SourceFolder: '$(agent.builddirectory)'
      Contents: '**/?(*Signed.aab|*Signed.apk)'
      TargetFolder: '$(build.artifactstagingdirectory)'
      flattenFolders: true

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: 'Android artifacts'
      publishLocation: 'Container'